  <body class="">
    <div class="flex items-center justify-center min-h-screen">
      <form id="form" class="flex flex-col border p-20">
        <h2 class="-mt-15">LOGIN NGA</h2>
        <input
          type="text"
          id="username"
          placeholder="Enter your name"
          class="border mt-10 px-4 py-1"
        />
        <input
          type="text"
          id="password"
          placeholder="Enter your password"
          class="border mt-10 px-4 py-1"
        />
        <p id="message" class="text-red-700 mt-3"></p>
        <p id="message2" class="text-green-500 mt-3"></p>
        <button type="submit" class="bg-slate-400 mt-4 py-1">Submit</button>
      </form>
    </div>

    <script>
      let username = document.getElementById("username");
      let password = document.getElementById("password");
      let message = document.getElementById("message");
      let message2 = document.getElementById("message2");
      let form = document.getElementById("form");

      const correctUserName = "olajide";
      const correctPassword = "olajide2007";

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        let user = username.value;
        let pass = password.value;

        if (user === "" || pass === "") {
          message.textContent = "Field(s) cannot be left empty";
          message2.textContent = "";
        } else if (user !== correctUserName || pass !== correctPassword) {
          message.textContent = "Details are incorrect";
          message2.textContent = "";
        } else {
          message2.textContent = "Logged in successfully";
          message.textContent = "";
        }

        username.value = "";
        password.value = "";
      });
    </script>
  </body>
</html>
